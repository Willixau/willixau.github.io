<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection...</title>
    
    <!-- Redirection HTML instantanée (0 seconde) -->
    <meta http-equiv="refresh" content="0; url=https://github.com">
    <link rel="canonical" href="https://github.com">

    <!-- Sécurité JavaScript si le navigateur bloque la balise meta -->
    <script>
        window.location.replace("https://github.com");
    </script>
</head>
<body>
    <dfn style="display: block; text-align: center; margin-top: 20%; font-family: sans-serif;">
        Si vous n'êtes pas redirigé automatiquement, 
        <a href="https://github.com">cliquez ici pour accéder au profil GitHub</a>.
    </dfn>
</body>
</html>
